<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SUMUR_AI:(NOVA)</title>
  <meta name="description" content="Nova AI — Interactive 3D Avatar Lab by Sumur Digital">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/assets/index-D2AUnkZX.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-c4euG15k.css">
</head>
<body>


  <div class="app-frame scanline-overlay">
    <div class="container">
      <!-- Header -->
      <header class="header">
        <h1 class="brand">SUMUR_AI:<span class="brand-accent">(NOVA)</span></h1>
      </header>

      <!-- Model Selector (hidden, accessible via dev) -->
      <div class="model-switcher" id="model-switcher" style="display:none">
        <button class="model-btn" data-model="helmet">HELMET</button>
        <button class="model-btn" data-model="misa">MISA</button>
        <button class="model-btn active" data-model="avatar">AVATAR</button>
      </div>

      <!-- Controls row (hidden, accessible via dev) -->
      <div class="controls-row" id="controls-row" style="display:none">
        <button id="talk-btn" class="ctrl-btn">▶ TALK</button>
        <button id="lighting-btn" class="ctrl-btn">☀ FLAT</button>
        <button id="sliders-toggle" class="ctrl-btn">⚙ TWEAK</button>
      </div>

      <!-- Sliders panel -->
      <div id="sliders-panel" class="sliders-panel" style="display:none">
        <div class="slider-row">
          <label>AMBIENT</label>
          <input type="range" id="sl-ambient" min="0" max="5" step="0.1" value="2">
          <span class="sl-val" id="sv-ambient">2.0</span>
        </div>
        <div class="slider-row">
          <label>KEY LIGHT</label>
          <input type="range" id="sl-key" min="0" max="10" step="0.1" value="4">
          <span class="sl-val" id="sv-key">4.0</span>
        </div>
        <div class="slider-row">
          <label>RIM LIGHT</label>
          <input type="range" id="sl-rim" min="0" max="10" step="0.1" value="2">
          <span class="sl-val" id="sv-rim">2.0</span>
        </div>
        <div class="slider-row">
          <label>ROUGHNESS</label>
          <input type="range" id="sl-rough" min="0" max="1" step="0.01" value="0.5">
          <span class="sl-val" id="sv-rough">0.50</span>
        </div>
        <div class="slider-row">
          <label>METALNESS</label>
          <input type="range" id="sl-metal" min="0" max="1" step="0.01" value="0">
          <span class="sl-val" id="sv-metal">0.00</span>
        </div>
        <div class="slider-row">
          <label>ENV MAP</label>
          <input type="range" id="sl-env" min="0" max="3" step="0.05" value="0">
          <span class="sl-val" id="sv-env">0.00</span>
        </div>
      </div>

      <!-- 3D Viewer -->
      <div id="viewer-container" class="viewer-container">
        <canvas id="three-canvas"></canvas>
        <div id="loading-indicator" class="loading">
          <span class="loading-text">LOADING MODEL<span class="dots">...</span></span>
        </div>
      </div>

      <!-- Q&A Panel -->
      <div class="qa-panel">
        <div id="qa-answer" class="qa-answer"></div>
        <div class="qa-buttons">
          <button class="qa-btn" data-q="identity">¿Quién soy?</button>
          <button class="qa-btn" data-q="origin">¿Quién me ha construido?</button>
          <button class="qa-btn" data-q="tech">¿Qué tecnología uso?</button>
        </div>
      </div>

      <!-- Footer -->
      <footer class="footer">
        <div class="footer-line"></div>
        <div class="footer-content">
          <span class="footer-text">Made with passion by <a href="https://sumurdigital.com" target="_blank" rel="noopener">SUMUR DIGITAL</a></span>
        </div>
      </footer>
    </div>
  </div>

</body>
</html>
